version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: vc-postgres
    environment:
      POSTGRES_DB: virtual_class
      POSTGRES_USER: vcuser
      POSTGRES_PASSWORD: vcpass123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vc-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
